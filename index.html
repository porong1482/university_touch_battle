<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대학교 터치 배틀</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Jua', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            transition: background 0.8s ease;
        }
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ── 로그인/회원가입 화면 ── */
        #auth-screen {
            width: 100%;
            max-width: 340px;
            margin-top: 40px;
        }
        #auth-screen h1 { font-size: 28px; color: #ff6b6b; text-align: center; margin-bottom: 6px; text-shadow: 2px 2px 0 #ffb3b3; }
        #auth-screen p { text-align: center; color: #ff9999; margin-bottom: 30px; font-size: 14px; }
        .auth-box {
            background: white;
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 6px 0 #ffb3b3;
        }
        .auth-box h2 { font-size: 20px; color: #ff6b6b; margin-bottom: 18px; text-align: center; }
        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ffb3b3;
            border-radius: 16px;
            font-family: 'Jua', sans-serif;
            font-size: 15px;
            margin-bottom: 12px;
            outline: none;
            color: #555;
        }
        .auth-box input:focus { border-color: #ff6b6b; }
        .btn-main {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 16px;
            font-family: 'Jua', sans-serif;
            font-size: 17px;
            cursor: pointer;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 #e05555;
            transition: transform 0.1s;
        }
        .btn-main:active { transform: translateY(3px); box-shadow: 0 1px 0 #e05555; }
        .btn-sub {
            width: 100%;
            padding: 10px;
            background: white;
            color: #ff6b6b;
            border: 2px solid #ffb3b3;
            border-radius: 16px;
            font-family: 'Jua', sans-serif;
            font-size: 15px;
            cursor: pointer;
        }
        .error-msg { color: #ff4444; font-size: 13px; text-align: center; margin-bottom: 10px; min-height: 18px; }

        /* ── 게임 화면 ── */
        #game-screen { display: none; width: 100%; max-width: 380px; align-items: center; flex-direction: column; }
        h1.game-title { font-size: 26px; color: #ff6b6b; text-shadow: 2px 2px 0 #ffb3b3; margin-bottom: 4px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 14px; }
        .user-info { font-size: 14px; color: #ff9999; }
        .btn-logout { background: none; border: 2px solid #ffb3b3; border-radius: 12px; padding: 4px 12px; font-family: 'Jua', sans-serif; font-size: 13px; color: #ff9999; cursor: pointer; }

        select {
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Jua', sans-serif;
            border-radius: 20px;
            border: 3px solid #ffb3b3;
            background: white;
            margin-bottom: 12px;
            width: 250px;
            color: #ff6b6b;
            cursor: pointer;
        }
        #title-badge {
            font-size: 15px;
            background: #ff6b6b;
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            display: none;
        }
        #touch-area {
            width: 220px; height: 220px;
            border-radius: 50%;
            background: white;
            border: 5px solid #ffb3b3;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
            transition: transform 0.08s;
            user-select: none;
            box-shadow: 0 8px 0 #ffb3b3;
            margin-bottom: 8px;
        }
        #touch-area:active { transform: scale(0.93) translateY(6px); box-shadow: 0 2px 0 #ffb3b3; }
        #touch-area img {
            width: 130px;
            height: 130px;
            object-fit: contain;
        }
        #touch-emoji { font-size: 60px; line-height: 1; }
        #my-count { font-size: 32px; font-weight: bold; color: #ff6b6b; }
        #touch-label { font-size: 13px; color: #ffb3b3; }

        #inventory { margin-top: 12px; width: 100%; }
        #inventory h3 { font-size: 16px; color: #ff6b6b; margin-bottom: 8px; text-align: center; }
        #item-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
        .item-chip {
            background: white; border: 2px solid #ffb3b3;
            border-radius: 20px; padding: 4px 12px;
            font-size: 14px; cursor: pointer; transition: all 0.15s;
        }
        .item-chip:hover, .item-chip.active { background: #ff6b6b; color: white; border-color: #ff6b6b; }

        #ranking { width: 100%; }
        #ranking h2 { font-size: 20px; color: #ff6b6b; margin-bottom: 10px; text-align: center; }
        .rank-item {
            background: white; border-radius: 16px;
            padding: 10px 18px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 3px 0 #ffb3b3;
        }
        .rank-num { font-size: 20px; width: 30px; }
        .rank-name { flex: 1; margin-left: 8px; color: #555; font-size: 15px; }
        .rank-count { font-weight: bold; color: #ff6b6b; }

        /* 팝업 */
        #item-popup {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white; border-radius: 24px;
            padding: 30px 40px; text-align: center;
            box-shadow: 0 10px 40px rgba(255,107,107,0.3);
            border: 3px solid #ffb3b3; z-index: 100;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #item-popup.show { transform: translate(-50%, -50%) scale(1); }
        #item-popup .popup-emoji { font-size: 60px; }
        #item-popup .popup-title { font-size: 20px; color: #ff6b6b; margin: 8px 0 4px; }
        #item-popup .popup-desc { font-size: 14px; color: #ffb3b3; margin-bottom: 16px; }
        #item-popup button { background: #ff6b6b; color: white; border: none; border-radius: 20px; padding: 8px 30px; font-family: 'Jua', sans-serif; font-size: 16px; cursor: pointer; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 99; }
        .overlay.show { display: block; }
    /* 사이드 패널 */
    #menu-btn {
        position: fixed;
        top: 16px;
        right: 16px;
        background: white;
        border: 2px solid #ffb3b3;
        border-radius: 12px;
        padding: 6px 12px;
        font-size: 20px;
        cursor: pointer;
        z-index: 200;
        box-shadow: 0 3px 0 #ffb3b3;
    }
    #item-panel {
        position: fixed;
        top: 0; right: -100%;
        width: 320px;
        height: 100vh;
        background: #fff8f5;
        border-left: 3px solid #ffb3b3;
        z-index: 300;
        transition: right 0.3s ease;
        overflow-y: auto;
        padding: 20px;
    }
    #item-panel.open { right: 0; }
    #item-panel h2 { font-size: 20px; color: #ff6b6b; margin-bottom: 16px; }
    .panel-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 299;
    }
    .panel-overlay.show { display: block; }

    /* 슬롯 */
    .slots-area { margin-bottom: 20px; }
    .slots-area h3 { font-size: 15px; color: #ff6b6b; margin-bottom: 10px; }
    .slots-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .slot {
        width: 80px; height: 80px;
        border: 2px dashed #ffb3b3;
        border-radius: 16px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        font-size: 11px; color: #ffb3b3;
        cursor: pointer;
        background: white;
        transition: all 0.15s;
    }
    .slot.filled { border: 2px solid #ff6b6b; color: #ff6b6b; }
    .slot .slot-emoji { font-size: 28px; }
    .slot .slot-name { font-size: 10px; text-align: center; margin-top: 2px; }

    /* 아이템 카드 */
    .item-card {
        background: white;
        border-radius: 16px;
        padding: 12px;
        margin-bottom: 10px;
        border: 2px solid #ffb3b3;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .item-card.locked { opacity: 0.4; }
    .item-card .item-emoji { font-size: 30px; }
    .item-card .item-info { flex: 1; }
    .item-card .item-name { font-size: 14px; color: #ff6b6b; }
    .item-card .item-desc { font-size: 11px; color: #aaa; margin-top: 2px; }
    .item-card .item-grade { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; display: inline-block; }
    .grade-일반 { background: #e0e0e0; color: #666; }
    .grade-희귀 { background: #bbdefb; color: #1565c0; }
    .grade-전설 { background: #fff9c4; color: #f57f17; }
    .item-equip-btn {
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 12px;
        padding: 6px 10px;
        font-family: 'Jua', sans-serif;
        font-size: 12px;
        cursor: pointer;
    }
    .item-equip-btn.unequip { background: #ffb3b3; }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <!-- 로그인/회원가입 화면 -->
    <div id="auth-screen">
        <h1>🏫 대학 터치 배틀!</h1>
        <p>터치해서 내 대학교를 1등으로!</p>
        <div class="auth-box" id="login-box">
            <h2>🔑 로그인</h2>
            <input type="text" id="login-username" placeholder="닉네임" />
            <input type="password" id="login-password" placeholder="비밀번호" />
            <div class="error-msg" id="login-error"></div>
            <button class="btn-main" onclick="doLogin()">로그인</button>
            <button class="btn-sub" onclick="showRegister()">회원가입</button>
        </div>
        <div class="auth-box" id="register-box" style="display:none">
            <h2>✏️ 회원가입</h2>
            <input type="text" id="reg-username" placeholder="닉네임 (2~10자)" />
            <input type="password" id="reg-password" placeholder="비밀번호" />
            <input type="password" id="reg-password2" placeholder="비밀번호 확인" />
            <div class="error-msg" id="reg-error"></div>
            <button class="btn-main" onclick="doRegister()">가입하기</button>
            <button class="btn-sub" onclick="showLogin()">로그인으로 돌아가기</button>
        </div>
    </div>
    <!-- 삼선 버튼 -->
    <button id="menu-btn" onclick="togglePanel()" style="display:none">☰</button>

    <!-- 패널 오버레이 -->
    <div class="panel-overlay" id="panel-overlay" onclick="togglePanel()"></div>

    <!-- 아이템 패널 -->
    <div id="item-panel">
        <!-- 탭 버튼 -->
        <div style="display:flex; gap:6px; margin-bottom:16px;">
            <button id="tab-item" onclick="switchTab('item')"
                style="flex:1; padding:8px 4px; border-radius:16px; border:2px solid #ff6b6b; background:#ff6b6b; color:white; font-family:'Jua',sans-serif; font-size:13px; cursor:pointer;">
                🎒 아이템
            </button>
            <button id="tab-sound" onclick="switchTab('sound')"
                style="flex:1; padding:8px 4px; border-radius:16px; border:2px solid #ffb3b3; background:white; color:#ff6b6b; font-family:'Jua',sans-serif; font-size:13px; cursor:pointer;">
                🎵 효과음
            </button>
            <button id="tab-theme" onclick="switchTab('theme')"
                style="flex:1; padding:8px 4px; border-radius:16px; border:2px solid #ffb3b3; background:white; color:#ff6b6b; font-family:'Jua',sans-serif; font-size:13px; cursor:pointer;">
                🎨 테마
            </button>
        </div>

        <!-- 아이템 탭 -->
        <div id="panel-item-content">
            <div class="slots-area">
                <h3>⚙️ 장착 슬롯 (최대 3개)</h3>
                <div class="slots-row">
                    <div class="slot" id="slot-0" onclick="selectSlot(0)">
                        <div class="slot-emoji">+</div>
                        <div class="slot-name">슬롯 1</div>
                    </div>
                    <div class="slot" id="slot-1" onclick="selectSlot(1)">
                        <div class="slot-emoji">+</div>
                        <div class="slot-name">슬롯 2</div>
                    </div>
                    <div class="slot" id="slot-2" onclick="selectSlot(2)">
                        <div class="slot-emoji">+</div>
                        <div class="slot-name">슬롯 3</div>
                    </div>
                </div>
            </div>
            <h3 style="font-size:15px; color:#ff6b6b; margin-bottom:10px;">📦 보유 아이템</h3>
            <div id="panel-item-list"></div>
        </div>

        <!-- 효과음 탭 -->
        <div id="panel-sound-content" style="display:none;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:16px;">
                <span onclick="toggleMute()" style="cursor:pointer; font-size:20px;">🔊</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5"
                    style="flex:1; accent-color:#ff6b6b;"
                    oninput="setVolume(this.value)">
            </div>
            <div style="color:#ff6b6b; margin-bottom:8px;">🎵 일반 터치음</div>
            <div id="normal-sound-list" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;"></div>
            <div style="color:#ff6b6b; margin-bottom:8px;">🔥 피버 터치음</div>
            <div id="fever-sound-list" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
        </div>

        <!-- 테마 탭 -->
        <div id="panel-theme-content" style="display:none;">
            <div style="color:#ff9999; font-size:13px; margin-bottom:12px; text-align:center;">접속 시기에 맞춰 자동 설정돼요!</div>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button onclick="setTheme('spring')" id="theme-btn-spring" style="padding:14px; border-radius:16px; border:2px solid #ffb3b3; background:white; font-family:'Jua',sans-serif; font-size:15px; cursor:pointer; text-align:left;">
                    🌸 봄 — 벚꽃 흩날리기
                </button>
                <button onclick="setTheme('summer')" id="theme-btn-summer" style="padding:14px; border-radius:16px; border:2px solid #ffb3b3; background:white; font-family:'Jua',sans-serif; font-size:15px; cursor:pointer; text-align:left;">
                    ☀️ 여름 — 풀잎 흩날리기
                </button>
                <button onclick="setTheme('autumn')" id="theme-btn-autumn" style="padding:14px; border-radius:16px; border:2px solid #ffb3b3; background:white; font-family:'Jua',sans-serif; font-size:15px; cursor:pointer; text-align:left;">
                    🍂 가을 — 단풍잎 흩날리기
                </button>
                <button onclick="setTheme('winter')" id="theme-btn-winter" style="padding:14px; border-radius:16px; border:2px solid #ffb3b3; background:white; font-family:'Jua',sans-serif; font-size:15px; cursor:pointer; text-align:left;">
                    ❄️ 겨울 — 눈 내리기
                </button>
                <button onclick="setTheme('none')" id="theme-btn-none" style="padding:14px; border-radius:16px; border:2px solid #ffb3b3; background:white; font-family:'Jua',sans-serif; font-size:15px; cursor:pointer; text-align:left;">
                    ⬜ 기본 — 효과 없음
                </button>
            </div>
        </div>
    </div>
    <!-- 게임 화면 -->
    <div id="game-screen">
        <h1 class="game-title">🏫 대학 터치 배틀!</h1>
        <div class="top-bar">
            <span class="user-info" id="user-info">👤 닉네임</span>
            <button class="btn-logout" onclick="doLogout()">로그아웃</button>
        </div>

        <select id="university-select">
            <option value="">🎓 대학교 선택</option>
            <option value="가천대" data-logo="/static/가천대학교.png">가천대</option>
            <option value="가톨릭대" data-logo="/static/가톨릭대학교.png">가톨릭대</option>
            <option value="강원대" data-logo="/static/강원대학교.png">강원대</option>
            <option value="건국대" data-logo="/static/건국대학교.png">건국대</option>
            <option value="경기대" data-logo="/static/경기대학교.png">경기대</option>
            <option value="경북대" data-logo="/static/경북대학교.png">경북대</option>
            <option value="경희대" data-logo="/static/경희대학교.png">경희대</option>
            <option value="고려대" data-logo="/static/고려대학교.png">고려대</option>
            <option value="광운대" data-logo="/static/광운대학교.png">광운대</option>
            <option value="GIST" data-logo="/static/GIST.png">GIST</option>
            <option value="국민대" data-logo="/static/국민대학교.png">국민대</option>
            <option value="단국대" data-logo="/static/단국대학교.png">단국대</option>
            <option value="DGIST" data-logo="/static/DGIST.png">DGIST</option>
            <option value="명지대" data-logo="/static/명지대학교.png">명지대</option>
            <option value="부산대" data-logo="/static/부산대학교.png">부산대</option>
            <option value="상명대" data-logo="/static/상명대학교.png">상명대</option>
            <option value="서강대" data-logo="/static/서강대학교.png">서강대</option>
            <option value="서울과기대" data-logo="/static/서울과학기술대학교.png">서울과기대</option>
            <option value="서울시립대" data-logo="/static/서울시립대학교.png">서울시립대</option>
            <option value="서울대" data-logo="/static/서울대학교.png">서울대</option>
            <option value="성균관대" data-logo="/static/성균관대학교.png">성균관대</option>
            <option value="세종대" data-logo="/static/세종대학교.png">세종대</option>
            <option value="숭실대" data-logo="/static/숭실대학교.png">숭실대</option>
            <option value="연세대" data-logo="/static/연세대학교.png">연세대</option>
            <option value="UNIST" data-logo="/static/UNIST.png">UNIST</option>
            <option value="이화여대" data-logo="/static/이화여자대학교.png">이화여대</option>
            <option value="인하대" data-logo="/static/인하대학교.png">인하대</option>
            <option value="전남대" data-logo="/static/전남대학교.png">전남대</option>
            <option value="전북대" data-logo="/static/전북대학교.png">전북대</option>
            <option value="제주대" data-logo="/static/제주대학교.png">제주대</option>
            <option value="중앙대" data-logo="/static/중앙대학교.png">중앙대</option>
            <option value="충남대" data-logo="/static/충남대학교.png">충남대</option>
            <option value="충북대" data-logo="/static/충북대학교.png">충북대</option>
            <option value="포항공대" data-logo="/static/포항공과대학교.png">포항공대</option>
            <option value="KAIST" data-logo="/static/KAIST.png">KAIST</option>
            <option value="한국외대" data-logo="/static/한국외국어대학교.png">한국외대</option>
            <option value="한양대" data-logo="/static/한양대학교.png">한양대</option>
            <option value="한양대 ERICA" data-logo="/static/한양대학교 ERICA.png">한양대 ERICA</option>
            <option value="홍익대" data-logo="/static/홍익대학교.png">홍익대</option>
        </select>

        <div id="title-badge">🏅 칭호 없음</div>

        <div style="font-size:13px; color:#ff9999; margin-bottom:6px;">총 터치: <span id="total-count">0</span>번</div>
        <div id="touch-area" onclick="handleTouch()">

    <script>
        let myCount = 0;

        let token = localStorage.getItem("token") || null;
        let currentUsername = localStorage.getItem("username") || null;
        let audioCtx = null;
        let soundVolume = 0.5;


        // 피버 타임
        let isFever = false;
        let feverTimeout = null;

        // 오토클릭 방지
        let clickCount = 0;
        let clickResetTimer = null;

        const ALL_UNIS = ["가천대","가톨릭대","강원대","건국대","경기대","경북대","경희대","고려대","광운대","GIST","국민대","단국대","DGIST","명지대","부산대","상명대","서강대","서울과기대","서울시립대","서울대","성균관대","세종대","숭실대","연세대","UNIST","이화여대","인하대","전남대","전북대","제주대","중앙대","충남대","충북대","포항공대","KAIST","한국외대","한양대","한양대 ERICA","홍익대"];

        const ITEMS = [
            { id: "sprout", emoji: "🌱", name: "새싹의 손", grade: "일반", desc: "10터치당 +1 자동 추가", condition: "총합 10번 달성" },
            { id: "lightning", emoji: "⚡", name: "번개손", grade: "일반", desc: "피버 발동 확률 +2%", condition: "총합 100번 달성" },
            { id: "fire", emoji: "🔥", name: "불꽃 의지", grade: "희귀", desc: "피버 지속시간 +2초", condition: "총합 1,000번 달성" },
            { id: "explorer", emoji: "🗺️", name: "대학 탐험가", grade: "희귀", desc: "대학 변경 시 첫 10번 2배", condition: "모든 대학교 1번씩 터치" },
            { id: "focus", emoji: "💫", name: "집중력", grade: "희귀", desc: "피버 배수 x3으로 증가", condition: "총합 10,000번 달성" },
            { id: "robot", emoji: "🤖", name: "자동손", grade: "희귀", desc: "5초마다 자동 터치", condition: "한 대학교 10,000번 달성" },
            { id: "crown", emoji: "👑", name: "터치의 신", grade: "전설", desc: "피버 발동 확률 +5%", condition: "총합 100,000번 달성" },
            { id: "gem", emoji: "💎", name: "다이아 손", grade: "전설", desc: "피버 지속시간 +5초", condition: "총합 1,000,000번 달성" },
            { id: "galaxy", emoji: "🌌", name: "우주손", grade: "전설", desc: "피버 배수 x5로 증가", condition: "총합 10,000,000번 달성" },
            { id: "legend", emoji: "⭐", name: "전설의 손", grade: "전설", desc: "모든 능력 중첩 적용", condition: "총합 100,000,000번 달성" },
        ];

        // 아이템 능력 계산
        function getItemStats() {
            const stats = {
                feverChanceBonus: 0,
                feverDurationBonus: 0,
                feverMultiplier: 2,
                autoTouch: false,
                bonusTouch: false,
                explorerBonus: false,
            };
            for (const slotId of equippedSlots) {
                if (!slotId) continue;
                if (slotId === "lightning") stats.feverChanceBonus += 0.02;
                if (slotId === "fire") stats.feverDurationBonus += 2000;
                if (slotId === "focus") stats.feverMultiplier = 3;
                if (slotId === "robot") stats.autoTouch = true;
                if (slotId === "sprout") stats.bonusTouch = true;
                if (slotId === "crown") stats.feverChanceBonus += 0.05;
                if (slotId === "gem") stats.feverDurationBonus += 5000;
                if (slotId === "galaxy") stats.feverMultiplier = 5;
                if (slotId === "explorer") stats.explorerBonus = true;
                if (slotId === "legend") {
                    stats.feverChanceBonus += 0.07;
                    stats.feverDurationBonus += 7000;
                    stats.feverMultiplier = 5;
                    stats.autoTouch = true;
                    stats.bonusTouch = true;
                    stats.explorerBonus = true;
                }
            }
            return stats;
        }

        const TITLES = [
            { count: 1, title: "🐣 터치 입문자" },
            { count: 10, title: "🌱 새싹 터처" },
            { count: 100, title: "🔥 열정러" },
            { count: 1000, title: "💪 터치 고수" },
            { count: 10000, title: "⚡ 터치 신인류" },
            { count: 100000, title: "👽 외계인 터처" },
            { count: 1000000, title: "🌌 우주 터처" },
            { count: 10000000, title: "⭐ 터치 레전드" },
            { count: 100000000, title: "👑 터치의 신" },
        ];

        // ── 시작 시 토큰 확인 ──
        window.onload = () => {
            if (token) loadGame();
            else showAuthScreen();
        };

        function showAuthScreen() {
            document.getElementById("auth-screen").style.display = "block";
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("menu-btn").style.display = "none";
        }

        function showLogin() {
            document.getElementById("login-box").style.display = "block";
            document.getElementById("register-box").style.display = "none";
        }

        function showRegister() {
            document.getElementById("login-box").style.display = "none";
            document.getElementById("register-box").style.display = "block";
        }

        async function doLogin() {
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value;
            if (!username || !password) {
                document.getElementById("login-error").textContent = "닉네임과 비밀번호를 입력해주세요!";
                return;
            }
            const form = new FormData();
            form.append("username", username);
            form.append("password", password);
            const res = await fetch("/login", { method: "POST", body: form });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById("login-error").textContent = data.detail;
                return;
            }
            token = data.access_token;
            currentUsername = data.username;
            localStorage.setItem("token", token);
            localStorage.setItem("username", currentUsername);
            loadGame();
        }

        async function doRegister() {
            const username = document.getElementById("reg-username").value.trim();
            const password = document.getElementById("reg-password").value;
            const password2 = document.getElementById("reg-password2").value;
            if (username.length < 2 || username.length > 10) {
                document.getElementById("reg-error").textContent = "닉네임은 2~10자로 입력해주세요!";
                return;
            }
            if (password.length < 4) {
                document.getElementById("reg-error").textContent = "비밀번호는 4자 이상이어야 해요!";
                return;
            }
            if (password !== password2) {
                document.getElementById("reg-error").textContent = "비밀번호가 일치하지 않아요!";
                return;
            }
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById("reg-error").textContent = data.detail;
                return;
            }
            token = data.access_token;
            currentUsername = data.username;
            localStorage.setItem("token", token);
            localStorage.setItem("username", currentUsername);
            loadGame();
        }
        let prevVolume = 0.5;
        let selectedNormalSound = "pop";
        let selectedFeverSound = "rise";
        let currentTheme = "none";
        let particleAnimId = null;

        // ── 테마 설정 ──
        const THEMES = {
            spring: { bg: "linear-gradient(135deg, #ffd6e7 0%, #ffb3c6 100%)", particle: "🌸" },
            summer: { bg: "linear-gradient(135deg, #d4f5c0 0%, #85d96a 100%)", particle: "🌿" },
            autumn: { bg: "linear-gradient(135deg, #ffe4b5 0%, #e8823a 100%)", particle: "🍂" },
            winter: { bg: "linear-gradient(135deg, #e8f4fd 0%, #b8d9f0 100%)", particle: "❄️" },
            none:   { bg: "linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)", particle: null },
        };

        function getSeasonTheme() {
            const month = new Date().getMonth() + 1;
            if (month >= 3 && month <= 5) return "spring";
            if (month >= 6 && month <= 8) return "summer";
            if (month >= 9 && month <= 11) return "autumn";
            return "winter";
        }

        function setTheme(theme) {
            currentTheme = theme;
            localStorage.setItem("theme", theme);
            document.body.style.background = THEMES[theme].bg;

            // 파티클 초기화
            if (particleAnimId) cancelAnimationFrame(particleAnimId);
            const canvas = document.getElementById("particle-canvas");
            const ctx2 = canvas.getContext("2d");
            ctx2.clearRect(0, 0, canvas.width, canvas.height);

            if (THEMES[theme].particle) startParticles(theme);

            // 테마 버튼 강조
            ["spring","summer","autumn","winter","none"].forEach(t => {
                const btn = document.getElementById("theme-btn-" + t);
                if (btn) {
                    btn.style.background = t === theme ? "#ff6b6b" : "white";
                    btn.style.color = t === theme ? "white" : "#555";
                    btn.style.borderColor = t === theme ? "#ff6b6b" : "#ffb3b3";
                }
            });
        }

        function startParticles(theme) {
            const canvas = document.getElementById("particle-canvas");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx2 = canvas.getContext("2d");
            const emoji = THEMES[theme].particle;
            const particles = [];

            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: 14 + Math.random() * 14,
                    speed: 0.8 + Math.random() * 1.5,
                    drift: (Math.random() - 0.5) * 1.2,
                    rot: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.04,
                    opacity: 0.6 + Math.random() * 0.4,
                });
            }

            function animate() {
                ctx2.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx2.save();
                    ctx2.globalAlpha = p.opacity;
                    ctx2.font = p.size + "px serif";
                    ctx2.translate(p.x, p.y);
                    ctx2.rotate(p.rot);
                    ctx2.fillText(emoji, -p.size / 2, p.size / 2);
                    ctx2.restore();
                    p.y += p.speed;
                    p.x += p.drift;
                    p.rot += p.rotSpeed;
                    if (p.y > canvas.height + 30) {
                        p.y = -30;
                        p.x = Math.random() * canvas.width;
                    }
                });
                particleAnimId = requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener("resize", () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        }

        // ── 효과음 ──
        const NORMAL_SOUNDS = [
            { id: "pop",   name: "🎵 팝" },
            { id: "click", name: "🎵 클릭" },
            { id: "bell",  name: "🎵 종" },
            { id: "drum",  name: "🎵 드럼" },
            { id: "drop",  name: "🎵 물방울" },
            { id: "pick",  name: "🎵 픽" },
        ];
        const FEVER_SOUNDS = [
            { id: "rise",     name: "🔥 상승음" },
            { id: "electric", name: "🔥 전자음" },
            { id: "fanfare",  name: "🔥 팡파레" },
            { id: "laser",    name: "🔥 레이저" },
            { id: "coin",     name: "🔥 코인" },
            { id: "thunder",  name: "🔥 번개" },
        ];

        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playNormalSound(id) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(soundVolume * 0.3, ctx.currentTime);
            if (id === "pop") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(600, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            } else if (id === "click") {
                osc.type = "square";
                osc.frequency.setValueAtTime(1000, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
            } else if (id === "bell") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(1200, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            } else if (id === "drum") {
                osc.type = "triangle";
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            } else if (id === "drop") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(800, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.12);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
            } else if (id === "pick") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.06);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.06);
            }
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.2);
        }

        function playFeverSound(id) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            gain.gain.setValueAtTime(soundVolume * 0.3, ctx.currentTime);
            if (id === "rise") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(440, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            } else if (id === "electric") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
            } else if (id === "fanfare") {
                osc.type = "square";
                osc.frequency.setValueAtTime(523, ctx.currentTime);
                osc.frequency.setValueAtTime(659, ctx.currentTime + 0.05);
                osc.frequency.setValueAtTime(784, ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            } else if (id === "laser") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(1500, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            } else if (id === "coin") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(988, ctx.currentTime);
                osc.frequency.setValueAtTime(1319, ctx.currentTime + 0.07);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            } else if (id === "thunder") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(100, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(soundVolume * 0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            }
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.2);
        }

        function playTouchSound(isFeverMode) {
            if (soundVolume === 0) return;
            try {
                if (isFeverMode) playFeverSound(selectedFeverSound);
                else playNormalSound(selectedNormalSound);
            } catch(e) {}
        }

        function setVolume(val) {
            soundVolume = parseFloat(val);
            localStorage.setItem("soundVolume", soundVolume);
        }

        function toggleMute() {
            if (soundVolume > 0) {
                prevVolume = soundVolume;
                soundVolume = 0;
                document.getElementById("volume-slider").value = 0;
            } else {
                soundVolume = prevVolume;
                document.getElementById("volume-slider").value = prevVolume;
            }
            localStorage.setItem("soundVolume", soundVolume);
        }

        function renderSoundList() {
            const normalList = document.getElementById("normal-sound-list");
            const feverList = document.getElementById("fever-sound-list");
            normalList.innerHTML = "";
            feverList.innerHTML = "";
            for (const s of NORMAL_SOUNDS) {
                const btn = document.createElement("button");
                btn.textContent = s.name;
                btn.style.cssText = `padding:4px 10px; border-radius:20px; border:2px solid #ffb3b3; background:${selectedNormalSound === s.id ? "#ff6b6b" : "white"}; color:${selectedNormalSound === s.id ? "white" : "#ff6b6b"}; font-family:'Jua',sans-serif; font-size:12px; cursor:pointer;`;
                btn.onclick = () => {
                    selectedNormalSound = s.id;
                    playNormalSound(s.id);
                    localStorage.setItem("normalSound", s.id);
                    renderSoundList();
                };
                normalList.appendChild(btn);
            }
            for (const s of FEVER_SOUNDS) {
                const btn = document.createElement("button");
                btn.textContent = s.name;
                btn.style.cssText = `padding:4px 10px; border-radius:20px; border:2px solid #ffb3b3; background:${selectedFeverSound === s.id ? "#ff6b6b" : "white"}; color:${selectedFeverSound === s.id ? "white" : "#ff6b6b"}; font-family:'Jua',sans-serif; font-size:12px; cursor:pointer;`;
                btn.onclick = () => {
                    selectedFeverSound = s.id;
                    playFeverSound(s.id);
                    localStorage.setItem("feverSound", s.id);
                    renderSoundList();
                };
                feverList.appendChild(btn);
            }
        }

        function switchTab(tab) {
            const tabs = ["item", "sound", "theme"];
            tabs.forEach(t => {
                document.getElementById("panel-" + t + "-content").style.display = t === tab ? "block" : "none";
                const btn = document.getElementById("tab-" + t);
                btn.style.background = t === tab ? "#ff6b6b" : "white";
                btn.style.color = t === tab ? "white" : "#ff6b6b";
                btn.style.borderColor = t === tab ? "#ff6b6b" : "#ffb3b3";
            });
            if (tab === "sound") renderSoundList();
        }
        
        function doLogout() {
            token = null;
            currentUsername = null;
            localStorage.removeItem("token");
            localStorage.removeItem("username");
            myCount = 0;
            myItems = [];
            myTitles = [];
            equippedSlots = [null, null, null];
            visitedUnis = new Set();
            uniCountsLocal = {};
            totalCount = 0;
            document.getElementById("menu-btn").style.display = "none";
            showAuthScreen();
        }

        async function loadGame() {

            const savedVol = localStorage.getItem("soundVolume");
            if (savedVol !== null) {
                soundVolume = parseFloat(savedVol);
            }
            const savedNormal = localStorage.getItem("normalSound");
            const savedFever = localStorage.getItem("feverSound");
            if (savedNormal) selectedNormalSound = savedNormal;
            if (savedFever) selectedFeverSound = savedFever;

            // 테마 복원 (저장된 테마 or 현재 계절)
            const savedTheme = localStorage.getItem("theme") || getSeasonTheme();
            setTheme(savedTheme);
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "flex";
            document.getElementById("menu-btn").style.display = "block";

            const res = await fetch("/me", {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!res.ok) { doLogout(); return; }
            const user = await res.json();

            currentUsername = user.username;
            totalCount = user.touch_count;
            document.getElementById("user-info").textContent = "👤 " + user.username;
            document.getElementById("my-count").textContent = 0;

            if (user.university) {
                selectedUniversity = user.university;
                document.getElementById("university-select").value = user.university;
            }
            if (user.items) {
                const savedIds = user.items.split(",").filter(Boolean);
                myItems = ITEMS.filter(i => savedIds.includes(i.id));
            }
            if (user.titles) {
                myTitles = user.titles.split(",").filter(Boolean);
            }
            if (user.slots) {
                equippedSlots = user.slots.split(",").map(s => s || null);
            }
            if (user.visited_unis) {
                visitedUnis = new Set(user.visited_unis.split(",").filter(Boolean));
            }
            if (user.uni_counts) {
                try { uniCountsLocal = JSON.parse(user.uni_counts); } catch(e) {}
            }

            // 자동손 복원
            const stats = getItemStats();
            if (stats.autoTouch) startAutoTouch();

            updateTitleBadge();
            checkItemUnlock();
            renderInventory();
            loadRanking();
        }

        document.getElementById("university-select").addEventListener("change", function() {
            selectedUniversity = this.value;
            const logo = this.options[this.selectedIndex].getAttribute("data-logo");
            const imgEl = document.getElementById("uni-logo");
            const emojiEl = document.getElementById("touch-emoji");
            if (logo) {
                imgEl.src = logo;
                imgEl.style.display = "block";
                emojiEl.style.display = "none";
            } else {
                imgEl.style.display = "none";
                emojiEl.style.display = "block";
            }
            const stats = getItemStats();
            if (stats.explorerBonus) explorerBonusCount = 10;
        });

        async function handleTouch() {
            if (!selectedUniversity) { alert("대학교를 먼저 선택해주세요!"); return; }

            // 오토클릭 방지
            const now = Date.now();
            if (!window.clickTimes) window.clickTimes = [];
            window.clickTimes.push(now);
            window.clickTimes = window.clickTimes.filter(t => now - t < 1000);
            if (window.clickTimes.length > 50) return;

            playTouchSound(isFever);

            const stats = getItemStats();
            const feverMult = isFever ? stats.feverMultiplier : 1;

            // 탐험가 보너스
            let explorerMult = 1;
            if (stats.explorerBonus && explorerBonusCount > 0) {
                explorerMult = 2;
                explorerBonusCount--;
            }

            const point = feverMult * explorerMult;
            totalCount += point;

            if (!uniCountsLocal[selectedUniversity]) uniCountsLocal[selectedUniversity] = 0;
            uniCountsLocal[selectedUniversity] += point;
            myCount = uniCountsLocal[selectedUniversity];

            document.getElementById("my-count").textContent = myCount;
            document.getElementById("total-count").textContent = totalCount;

            // 새싹의 손 - 10터치당 +1
            if (stats.bonusTouch && totalCount % 10 === 0) {
                totalCount += 1;
                uniCountsLocal[selectedUniversity] += 1;
                document.getElementById("total-count").textContent = totalCount;
                document.getElementById("my-count").textContent = uniCountsLocal[selectedUniversity];
            }

            const area = document.getElementById("touch-area");
            area.style.background = isFever ? "#fffde7" : "#fff0f0";
            setTimeout(() => area.style.background = isFever ? "#fffde7" : "white", 150);

            // 방문 대학 기록
            visitedUnis.add(selectedUniversity);

            await fetch("/touch", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ university: selectedUniversity, point: point })
            });

            // 피버 발동
            const feverChance = 0.01 + stats.feverChanceBonus;
            if (!isFever && Math.random() < feverChance) startFever();

            checkTitle();
            checkItemUnlock();
            saveUserData();
            loadRanking();
        }

        function startFever() {
            isFever = true;
            const stats = getItemStats();
            const duration = 5000 + stats.feverDurationBonus;

            const area = document.getElementById("touch-area");
            area.style.border = "5px solid #ff9800";
            area.style.background = "#fffde7";
            area.style.boxShadow = "0 8px 0 #ff9800, 0 0 30px #ffeb3b";

            const label = document.getElementById("touch-label");
            label.textContent = `🔥 FEVER! ${stats.feverMultiplier}배!`;
            label.style.color = "#ff9800";

            if (feverTimeout) clearTimeout(feverTimeout);
            feverTimeout = setTimeout(endFever, duration);
        }

        function endFever() {
            isFever = false;
            const area = document.getElementById("touch-area");
            area.style.border = "5px solid #ffb3b3";
            area.style.background = "white";
            area.style.boxShadow = "0 8px 0 #ffb3b3";

            const label = document.getElementById("touch-label");
            label.textContent = "탭!";
            label.style.color = "#ffb3b3";
        }

                function checkTitle() {
                    let earned = null;
                    for (const t of TITLES) {
                        if (totalCount >= t.count) earned = t;
                    }
                    if (earned && !myTitles.includes(earned.title)) {
                        myTitles.push(earned.title);
                        showPopup("🏅", "칭호 획득!", earned.title);
                    }
                    updateTitleBadge();
                }

                function updateTitleBadge() {
                    let earned = null;
                    for (const t of TITLES) {
                        if (totalCount >= t.count) earned = t;
                    }
                    const badge = document.getElementById("title-badge");
                    if (earned) {
                        badge.textContent = earned.title;
                        badge.style.display = "inline-block";
                    }
                }

            function checkItemUnlock() {
            for (const item of ITEMS) {
                if (myItems.find(i => i.id === item.id)) continue;

                let unlocked = false;

                if (item.id === "sprout" && totalCount >= 10) unlocked = true;
                if (item.id === "lightning" && totalCount >= 100) unlocked = true;
                if (item.id === "fire" && totalCount >= 1000) unlocked = true;
                if (item.id === "focus" && totalCount >= 10000) unlocked = true;
                if (item.id === "crown" && totalCount >= 100000) unlocked = true;
                if (item.id === "gem" && totalCount >= 1000000) unlocked = true;
                if (item.id === "galaxy" && totalCount >= 10000000) unlocked = true;
                if (item.id === "legend" && totalCount >= 100000000) unlocked = true;
                if (item.id === "robot" && Object.values(uniCountsLocal).some(v => v >= 10000)) unlocked = true;
                if (item.id === "explorer" && ALL_UNIS.every(u => visitedUnis.has(u))) unlocked = true;

                if (unlocked) {
                    myItems.push(item);
                    showPopup(item.emoji, item.name + " 획득!", item.desc + "\n[" + item.condition + "]");
                    renderPanel();
                }
            }
        }

        async function saveUserData() {
            await fetch("/update_user", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({
                    items: myItems.map(i => i.id).join(","),
                    titles: myTitles.join(","),
                    university: selectedUniversity,
                    slots: equippedSlots.map(s => s || "").join(","),
                    visited_unis: Array.from(visitedUnis).join(","),
                    uni_counts: JSON.stringify(uniCountsLocal)
                })
            });
        }

        function renderInventory() {
            // 구 버전 호환용 - 빈 함수
        }

        function togglePanel() {
            const panel = document.getElementById("item-panel");
            const overlay = document.getElementById("panel-overlay");
            panel.classList.toggle("open");
            overlay.classList.toggle("show");
            renderPanel();
        }

        function renderPanel() {
            renderSlots();
            renderPanelItems();
        }

        function renderSlots() {
            for (let i = 0; i < 3; i++) {
                const slot = document.getElementById("slot-" + i);
                const itemId = equippedSlots[i];
                const item = ITEMS.find(it => it.id === itemId);
                if (item) {
                    slot.classList.add("filled");
                    slot.innerHTML = `<div class="slot-emoji">${item.emoji}</div><div class="slot-name">${item.name}</div>`;
                } else {
                    slot.classList.remove("filled");
                    slot.innerHTML = `<div class="slot-emoji">+</div><div class="slot-name">슬롯 ${i+1}</div>`;
                }
                slot.style.border = selectedSlotIndex === i ? "2px solid #ff6b6b" : "";
            }
        }

        function selectSlot(index) {
            selectedSlotIndex = index;
            renderSlots();
        }

        function renderPanelItems() {
            const list = document.getElementById("panel-item-list");
            list.innerHTML = "";
            for (const item of ITEMS) {
                const owned = myItems.find(i => i.id === item.id);
                const equippedCount = equippedSlots.filter(s => s === item.id).length;
                const card = document.createElement("div");
                card.className = "item-card" + (owned ? "" : " locked");
                card.innerHTML = `
                    <div class="item-emoji">${item.emoji}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name} ${equippedCount > 0 ? "⚙️x" + equippedCount : ""}</div>
                        <div class="item-desc">${item.desc}</div>
                        <div class="item-desc" style="color:#ffb3b3">${owned ? "✅ 보유" : "🔒 " + item.condition}</div>
                        <span class="item-grade grade-${item.grade}">${item.grade}</span>
                    </div>
                    ${owned ? `<button class="item-equip-btn" onclick="equipItem('${item.id}')">장착</button>` : ""}
                `;
                list.appendChild(card);
            }
        }

        function equipItem(itemId) {
            if (selectedSlotIndex === null) {
                alert("먼저 슬롯을 선택해주세요!");
                return;
            }
            equippedSlots[selectedSlotIndex] = itemId;
            selectedSlotIndex = null;

            // 자동손 처리
            const stats = getItemStats();
            if (stats.autoTouch) startAutoTouch();
            else stopAutoTouch();

            renderPanel();
            saveUserData();
        }

        function startAutoTouch() {
            if (autoTouchTimer) return;
            autoTouchTimer = setInterval(() => {
                if (selectedUniversity) handleTouch();
            }, 5000);
        }

        function stopAutoTouch() {
            if (autoTouchTimer) {
                clearInterval(autoTouchTimer);
                autoTouchTimer = null;
            }
        }

        function applyItem(id) {
            const item = myItems.find(i => i.id === id);
            if (!item) return;
            activeItem = activeItem === id ? null : id;
            currentEmoji = activeItem ? item.emoji : "🎓";
            document.getElementById("touch-emoji").textContent = currentEmoji;
            renderInventory();
        }

        function showPopup(emoji, title, desc) {
            document.getElementById("popup-emoji").textContent = emoji;
            document.getElementById("popup-title").textContent = title;
            document.getElementById("popup-desc").textContent = desc;
            document.getElementById("item-popup").classList.add("show");
            document.getElementById("overlay").classList.add("show");
        }

        function closePopup() {
            document.getElementById("item-popup").classList.remove("show");
            document.getElementById("overlay").classList.remove("show");
        }

        async function loadRanking() {
            const res = await fetch("/ranking");
            const data = await res.json();
            const list = document.getElementById("ranking-list");
            const medals = ["🥇", "🥈", "🥉"];
            list.innerHTML = "";
            data.ranking.forEach((item, index) => {
                list.innerHTML += `
                    <div class="rank-item">
                        <span class="rank-num">${medals[index] || (index + 1)}</span>
                        <span class="rank-name">${item.university}</span>
                        <span class="rank-count">${item.count.toLocaleString()}번</span>
                    </div>
                `;
            });
        }

        setInterval(loadRanking, 3000);
    </script>
</body>
</html>
